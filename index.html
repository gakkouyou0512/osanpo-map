<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>保育園お散歩安全マップ PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* 1. 全体のレイアウト */
        body, html {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; /* スクロールを禁止 */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* 2. 地図のエリア */
        #map {
            height: 100%; width: 100%;
            position: absolute; top: 0; left: 0; z-index: 0;
        }

        /* 3. フローティングアクションボタン (FAB) のコンテナ */
        .fab-container {
            position: fixed;
            bottom: 20px; right: 20px;
            z-index: 100; /* 地図より上に表示 */
            display: flex; flex-direction: column-reverse; align-items: center;
        }

        /* 4. メインの「＋」ボタン */
        .fab-main {
            width: 60px; height: 60px;
            background-color: #ff6b6b; /* 保育園っぽいピンク */
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none; color: white; font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        /* FABが「開いている」時のメインボタンの回転 */
        .fab-container.open .fab-main {
            transform: rotate(135deg);
            background-color: #ff4747;
        }

        /* 5. 扇状に広がるサブボタン（メニュー） */
        .fab-menu {
            list-style: none; padding: 0; margin: 0;
            margin-bottom: 15px; /* メインボタンとの隙間 */
            opacity: 0; pointer-events: none; /* 通常は非表示 */
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(20px); /* 少し下から出現 */
        }

        /* FABが「開いている」時のメニューの表示 */
        .fab-container.open .fab-menu {
            opacity: 1; pointer-events: auto;
            transform: translateY(0);
        }

        /* 6. 各サブボタンのスタイル */
        .fab-item {
            margin-bottom: 10px; display: flex; align-items: center; justify-content: flex-end;
        }

        .fab-btn {
            width: 50px; height: 50px;
            border-radius: 50%; border: none; color: white;
            font-size: 18px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        /* アイコンの種類ごとの色 */
        .fab-btn.danger { background-color: #e74c3c; } /* 赤：危険 */
        .fab-btn.toilet { background-color: #3498db; } /* 青：トイレ */
        .fab-btn.place { background-color: #2ecc71; } /* 緑：おすすめ */
        .fab-btn.curloc { background-color: #95a5a6; margin-top: 20px; } /* 灰：現在地へ(先生の指摘対応) */

        .fab-btn:active { transform: scale(0.9); } /* 押した時の凹み */

        /* サブボタンのラベル（オプション） */
        .fab-label {
            background-color: rgba(0,0,0,0.7); color: white;
            padding: 5px 10px; border-radius: 4px; font-size: 12px; margin-right: 10px;
            opacity: 0; transition: opacity 0.3s;
        }
        .fab-container.open .fab-label { opacity: 1; }

    </style>
</head>
<body>

    <div id="map"></div>

    <div class="fab-container" id="fabContainer">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-plus"></i>
        </button>
        
        <ul class="fab-menu">
            <li class="fab-item">
                <span class="fab-label">危険📍</span>
                <button class="fab-btn danger" data-type="danger"><i class="fas fa-exclamation-triangle"></i></button>
            </li>
            <li class="fab-item">
                <span class="fab-label">トイレ🚻</span>
                <button class="fab-btn toilet" data-type="toilet"><i class="fas fa-restroom"></i></button>
            </li>
            <li class="fab-item">
                <span class="fab-label">おすすめ🌟</span>
                <button class="fab-btn place" data-type="place"><i class="fas fa-star"></i></button>
            </li>
            <li class="fab-item">
                <span class="fab-label">現在地へ戻る</span>
                <button class="fab-btn curloc" id="btnCurLoc"><i class="fas fa-crosshairs"></i></button>
            </li>
        </ul>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap&v=weekly&solution_channel=GMP_CCS_withmarkers_v1" defer></script>

    <script>
        let map;
        let currentMarkerType = null; // 現在選択されているピンの種類
        let currentMarker = null; // 現在地のマーカー

        // 1. 地図の初期化
        function initMap() {
            // 保育園の初期位置（例：ふくい保育園付近）
            const initialPos = { lat: 36.065, lng: 136.222 };
            
            map = new Google Maps.Map(document.getElementById("map"), {
                zoom: 16,
                center: initialPos,
                mapTypeControl: false, // 地図/写真切り替えを非表示
                streetViewControl: false, // ストリートビューを非表示
                fullscreenControl: false, // 全画面ボタンを非表示
                styles: [ /* 必要であればここに地図のスタイルを入力 */ ]
            });

            // 現在地の取得とマーカーの設置
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };
                    currentMarker = new Google Maps.Marker({
                        position: pos,
                        map: map,
                        icon: {
                            path: Google Maps.SymbolPath.CIRCLE,
                            scale: 10, fillcolor: "#4285F4", fillOpacity: 1,
                            strokecolor: "white", strokeWeight: 2,
                        },
                        title: "現在地",
                    });
                    map.setCenter(pos);
                });
            }

            // 地図をクリックした時のイベント (ピンを指す)
            map.addListener("click", (e) => {
                if (currentMarkerType) {
                    placeMarker(e.latLng, currentMarkerType);
                }
            });
        }

        // 2. ピンを刺す処理 (Firebase連携の前段階)
        function placeMarker(latLng, type) {
            let color;
            switch (type) {
                case 'danger': color = '#e74c3c'; break;
                case 'toilet': color = '#3498db'; break;
                case 'place': color = '#2ecc71'; break;
            }

            // 今はFirebaseがないので、ブラウザ上に表示するだけ
            new Google Maps.Marker({
                position: latLng,
                map: map,
                icon: {
                    path: Google Maps.SymbolPath.BACKWARD_CLOSED_ARROW,
                    scale: 6, fillcolor: color, fillOpacity: 1,
                    strokecolor: "white", strokeWeight: 1,
                },
                animation: Google Maps.Animation.DROP,
            });

            // ピンを刺したら選択モードを解除
            currentMarkerType = null;
            document.querySelectorAll('.fab-btn').forEach(b => b.style.transform = 'scale(1)');
        }

        // 3. FABメニューの開閉ロジック
        const fabContainer = document.getElementById('fabContainer');
        const fabMain = document.getElementById('fabMain');

        fabMain.addEventListener('click', () => {
            fabContainer.classList.toggle('open');
        });

        // 4. サブボタン（ピンの種類選択）のロジック
        const fabButtons = document.querySelectorAll('.fab-menu .fab-btn[data-type]');
        fabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // 選択されたタイプを保存
                currentMarkerType = btn.getAttribute('data-type');
                
                // メニューを閉じる
                fabContainer.classList.remove('open');
                
                // 選択されたボタンを強調（少し大きくする）
                fabButtons.forEach(b => b.style.transform = 'scale(1)');
                btn.style.transform = 'scale(1.2)';
                
                alert(`地図上をクリックして「${currentMarkerType}」のピンを刺してください。`);
            });
        });

        // 5. 現在地に戻るボタン (先生の指摘対応)
        document.getElementById('btnCurLoc').addEventListener('click', () => {
            if (currentMarker && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };
                    currentMarker.setPosition(pos);
                    map.setCenter(pos);
                    fabContainer.classList.remove('open'); // メニューを閉じる
                });
            }
        });

    </script>
</body>
</html>
