<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>お散歩マップ</title>
  <style>
    /* 全体の基本設定 */
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; color: #333; overflow: hidden;
    }
    #map { width: 100%; height: 100vh; }

    /* ボトムシート（操作パネル） */
    #mapControls {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
      background: #ffffff; border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      transition: height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow-y: auto; z-index: 999;
      padding: 0 20px 20px 20px; box-sizing: border-box;
      overscroll-behavior-y: contain; /* スクロール誤爆防止 */
    }

    /* ★当たり判定の大きいドラッグエリア */
    #dragHandleArea {
      width: 100%; padding: 15px 0; margin-top: -5px; margin-bottom: 5px;
      cursor: ns-resize; touch-action: none;
    }
    #dragHandle {
      width: 60px; height: 6px; background: #bbb;
      border-radius: 3px; margin: 0 auto;
    }

    .menu-section { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .menu-section h3 { margin: 0 0 10px 0; font-size: 18px; color: #444; }

    input[type="text"], select {
      width: 100%; padding: 12px; margin-bottom: 10px; font-size: 16px !important;
      border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; background: #fff;
    }
    button {
      width: 100%; padding: 14px; margin-bottom: 8px; font-size: 16px; font-weight: bold;
      color: #fff; background-color: #4CAF50; border: none; border-radius: 8px;
      cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); touch-action: manipulation;
    }
    button.secondary { background-color: #6c757d; }
    button.danger { background-color: #dc3545; }

    .mode-switch-container {
      display: flex; align-items: center; justify-content: space-between;
      background: #e9ecef; padding: 12px 20px; border-radius: 50px;
      margin-bottom: 20px; font-weight: bold; font-size: 18px;
    }
    .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #ff9800; }
    input:checked + .slider:before { transform: translateX(26px); }

    /* ★現在地ボタンを右上に浮かせる */
    #floatingLocationBtn {
      position: absolute; top: 180px; right: 10px; width: 40px; height: 40px;
      background: white; border-radius: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-size: 20px; text-align: center; line-height: 40px; cursor: pointer; z-index: 998;
    }

    #memoList, #routeList { margin-top: 10px; display: none; }
    .memoItem { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div id="floatingLocationBtn" onclick="showCurrentLocation()">🎯</div>

  <div id="mapControls">
    <div id="dragHandleArea">
      <div id="dragHandle"></div>
    </div>

    <div class="mode-switch-container">
      <span id="modeLabel">🔍 地図を見るモード</span>
      <label class="switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="menu-section">
      <h3>🔍 場所を調べる</h3>
      <input id="placeInput" type="text" placeholder="例：西山公園">
      <button onclick="searchPlace()">検索する</button>
      <div id="searchResults" style="margin-top:10px; font-size:14px;"></div>
    </div>

    <div class="menu-section">
      <h3>🗺️ ルートを調べる</h3>
      <input id="originInput" type="text" placeholder="出発地（例：保育園）">
      <input id="destinationInput" type="text" placeholder="目的地">
      <button onclick="searchRoute()">ルートを検索</button>
      
      <button id="saveSearchedRouteBtn" onclick="saveSearchedRoute()" style="display:none; background-color: #ff9800;">検索ルートを保存</button>
      
      <button id="addWaypointBtn" class="secondary">経由地点を追加</button>
      
      <div id="waypointModal" style="display:none; background:#fff; padding:15px; border-radius:8px; margin-top:10px; border:1px solid #ccc;">
        <h4 style="margin-top:0;">経由地点の追加</h4>
        <input type="text" id="searchSpot" placeholder="経由地を検索">
        <button id="searchBtn" class="secondary">検索</button>
        <div id="waypointMemoList" style="margin-top:10px;"></div>
        <button id="confirmWaypoint" style="margin-top:10px;">決定して閉じる</button>
      </div>
    </div>

    <div class="menu-section">
      <h3>🚶‍♂️ 歩いて記録・一覧</h3>
      <div style="display: flex; gap: 10px;">
        <button id="startTrackBtn" onclick="startTracking()" style="background-color: #007bff;">記録開始</button>
        <button id="stopTrackBtn" onclick="stopTracking()" class="danger">停止・保存</button>
      </div>
      <button onclick="showRouteList()" class="secondary">保存したルート一覧</button>
      
      <div style="margin-top: 15px;">
        <label style="font-size: 14px; font-weight:bold;">ピンの絞り込み表示:</label>
        <select id="categoryFilter" onchange="renderMemoList()">
          <option value="すべて">すべてのピンを表示</option>
        </select>
      </div>
    </div>

    <h3 id="routeTitle" style="display:none;">保存したルート</h3>
    <div id="routeList"></div>
  </div>

  <script>
    // ▼ パネルのドラッグ制御（混ざらないように超強化）
    const controls = document.getElementById("mapControls");
    const handleArea = document.getElementById("dragHandleArea");
    let isDragging = false;

    handleArea.addEventListener("mousedown", () => isDragging = true);
    document.addEventListener("mouseup", () => isDragging = false);
    document.addEventListener("mousemove", (e) => {
      if (isDragging) controls.style.height = (window.innerHeight - e.clientY) + "px";
    });
    handleArea.addEventListener("touchstart", (e) => { isDragging = true; }, {passive: false});
    document.addEventListener("touchend", () => isDragging = false);
    document.addEventListener("touchmove", (e) => {
      if (isDragging) {
        controls.style.height = (window.innerHeight - e.touches[0].clientY) + "px";
        e.preventDefault(); // ここでスクロール誤爆を防ぐ！
      }
    }, {passive: false});

    const routeColors = ["#FF0000", "#0000FF", "#00AA00", "#FF00FF", "#00FFFF", "#FFA500"];
    let displayedPolylines = [];
    let map;
    let route = [];
    let watchId = null;
    let currentLocationMarker = null;
    let spotMemos = [];
    let currentMode = "view";
    let directionsService;
    let directionsRenderer;
    let searchMarker = null;
    let tempMarker = null;
    let lastSearchedRoutePoints = null;

    const defaultIcons = [
      "http://maps.google.com/mapfiles/ms/icons/red-dot.png", "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
      "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png", "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
      "http://maps.google.com/mapfiles/ms/icons/purple-dot.png"
    ];
    let categories = [
      { name: "危険", icon: defaultIcons[0] }, { name: "おすすめ", icon: defaultIcons[1] }, { name: "注意", icon: defaultIcons[2] }
    ];

    function initMap() {
      // ★ コントロールが隠れないように上に退避＆左上のマップ切り替えを有効化
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 35.946, lng: 136.184 },
        zoom: 15,
        mapTypeId: "roadmap",
        gestureHandling: "greedy",
        zoomControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
        streetViewControl: true,
        streetViewControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
        mapTypeControl: true, // 左上の切り替えメニュー
        mapTypeControlOptions: {
          style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
          position: google.maps.ControlPosition.TOP_LEFT
        },
        fullscreenControl: false
      });

      function setupCleanAutocomplete(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const auto = new google.maps.places.Autocomplete(input);
        auto.bindTo("bounds", map);
        auto.addListener("place_changed", () => {
          const place = auto.getPlace();
          if (place && place.name) { setTimeout(() => { input.value = place.name; }, 10); }
        });
      }
      setupCleanAutocomplete("originInput");
      setupCleanAutocomplete("destinationInput");
      setupCleanAutocomplete("searchSpot");
      setupCleanAutocomplete("placeInput");

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer();
      directionsRenderer.setMap(map);

      updateCategoryFilter(); loadSpotMemos(); updateRouteList();

      map.addListener("click", (e) => {
        if (currentMode !== "edit") return;
        if (tempMarker) tempMarker.setMap(null);
        const latLng = e.latLng;
        const point = { lat: latLng.lat(), lng: latLng.lng(), memo: "", image: "", category: "" };
        tempMarker = new google.maps.Marker({ position: { lat: point.lat, lng: point.lng }, map: map });
        const infoWindow = new google.maps.InfoWindow();
        infoWindow.addListener("closeclick", () => { if (tempMarker) { tempMarker.setMap(null); tempMarker = null; } });
        showInputForm(point, infoWindow, tempMarker, true);
      });

      document.getElementById("addWaypointBtn").addEventListener("click", () => {
        renderWaypointsList();
        const modal = document.getElementById("waypointModal");
        modal.style.display = modal.style.display === "none" ? "block" : "none";
      });

      document.getElementById("searchBtn").addEventListener("click", () => {
        const query = document.getElementById("searchSpot").value;
        if (!query) return;
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: query, bounds: map.getBounds() }, (results, status) => {
          if (status === "OK") {
            const container = document.getElementById("searchResults");
            container.innerHTML = "<strong>検索結果:</strong><br>";
            results.slice(0, 5).forEach(place => {
              container.innerHTML += `<label><input type="checkbox" class="searchWaypoint" data-place-id="${place.place_id}"> ${place.formatted_address}</label><br>`;
            });
          } else { alert("検索に失敗しました"); }
        });
      });

      document.getElementById("confirmWaypoint").addEventListener("click", () => {
        document.getElementById("waypointModal").style.display = "none";
        alert("経由地点をセットしました！「ルートを検索」を押してください。");
      });
    }

    const modeToggle = document.getElementById("modeToggle");
    const modeLabel = document.getElementById("modeLabel");
    modeToggle.addEventListener("change", () => {
      if (modeToggle.checked) {
        currentMode = "edit"; modeLabel.textContent = "📌 ピンを置くモード";
      } else {
        currentMode = "view"; modeLabel.textContent = "🔍 地図を見るモード";
        if (tempMarker) { tempMarker.setMap(null); tempMarker = null; }
      }
    });

    function showRouteList() {
      let rTitle = document.getElementById("routeTitle");
      let rList = document.getElementById("routeList");
      if (rTitle.style.display === "none") {
        rTitle.style.display = "block"; rList.style.display = "block";
      } else {
        rTitle.style.display = "none"; rList.style.display = "none";
      }
    }

    function searchPlace() {
      const query = document.getElementById("placeInput").value;
      if (!query) return;
      if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: query }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          searchMarker = new google.maps.Marker({ position: results[0].geometry.location, map: map, title: results[0].formatted_address });
        } else { alert("検索に失敗しました"); }
      });
    }

    function searchRoute() {
      const origin = document.getElementById("originInput").value;
      const destination = document.getElementById("destinationInput").value;
      if (!origin || !destination) { alert("出発地と目的地を入力してください"); return; }
      
      const waypoints = [];
      document.querySelectorAll(".waypointCheckbox:checked").forEach(cb => {
        waypoints.push({ location: new google.maps.LatLng(parseFloat(cb.dataset.lat), parseFloat(cb.dataset.lng)), stopover: true });
      });
      document.querySelectorAll(".searchWaypoint:checked").forEach(cb => {
        waypoints.push({ location: { placeId: cb.dataset.placeId }, stopover: true });
      });
      
      directionsService.route({ origin, destination, waypoints, optimizeWaypoints: true, travelMode: google.maps.TravelMode.DRIVING }, (result, status) => {
        if (status === "OK") { 
          directionsRenderer.setDirections(result); 
          lastSearchedRoutePoints = result.routes[0].overview_path.map(p => ({lat: p.lat(), lng: p.lng()}));
          document.getElementById("saveSearchedRouteBtn").style.display = "inline-block";
        } else { alert("ルート検索に失敗しました"); }
      });
    }

    function saveSearchedRoute() {
      if (!lastSearchedRoutePoints) return;
      const name = prompt("検索したルートの名前を入力してください");
      if (!name) return;
      const description = prompt("ルートの説明を入力してください（空欄OK）");
      saveRoute(name, description || "", lastSearchedRoutePoints); 
      alert("保存しました！");
      document.getElementById("saveSearchedRouteBtn").style.display = "none"; 
      lastSearchedRoutePoints = null;
    }

    // ★ 記録開始の視覚的フィードバック
    function startTracking() {
      if (watchId) { alert("すでに記録中です！"); return; }
      route = [];
      alert("🚶‍♂️ ルートの記録を開始しました！スマホを持ったまま歩いてください。");
      document.getElementById("startTrackBtn").style.backgroundColor = "#ff9800";
      document.getElementById("startTrackBtn").innerText = "記録中...";

      watchId = navigator.geolocation.watchPosition(pos => {
        const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        route.push(latLng);
        if (currentLocationMarker) { currentLocationMarker.setPosition(latLng); } 
        else { currentLocationMarker = new google.maps.Marker({ position: latLng, map: map, icon: defaultIcons[3] }); }
        map.setCenter(latLng);
      });
    }

    function stopTracking() {
      if (watchId) { 
        navigator.geolocation.clearWatch(watchId); watchId = null; 
        document.getElementById("startTrackBtn").style.backgroundColor = "#007bff";
        document.getElementById("startTrackBtn").innerText = "記録開始";
      }
      if (route.length > 0) {
        const name = prompt("ルート名を入力してください");
        const description = prompt("説明を入力してください（空欄OK）");
        if (name) { saveRoute(name, description || "", route); alert("保存しました！"); }
      } else { alert("移動データがありませんでした。"); }
    }

    function saveRoute(name, description, points) {
      const routes = JSON.parse(localStorage.getItem("walkRoutes")) || [];
      routes.push({ name, description, points, timestamp: new Date().toISOString() });
      localStorage.setItem("walkRoutes", JSON.stringify(routes));
      updateRouteList();
    }

    function updateRouteList() {
      const container = document.getElementById("routeList");
      container.innerHTML = "";
      const routes = JSON.parse(localStorage.getItem("walkRoutes")) || [];
      routes.forEach((route, index) => {
        const item = document.createElement("div"); item.className = "memoItem";
        let totalDistance = 0;
        for (let i = 1; i < route.points.length; i++) {
          const p1 = new google.maps.LatLng(route.points[i - 1]); const p2 = new google.maps.LatLng(route.points[i]);
          totalDistance += google.maps.geometry.spherical.computeDistanceBetween(p1, p2);
        }
        item.innerHTML = `<strong>ルート:</strong> ${route.name}<br><strong>距離:</strong> ${(totalDistance / 1000).toFixed(2)} km<br>
        <button onclick="showRoute(${index})">表示</button> <button onclick="hideRoute(${index})">非表示</button> <button onclick="deleteRoute(${index})" class="danger">削除</button>`;
        container.appendChild(item);
      });
    }

    function showRoute(index) {
      const routes = JSON.parse(localStorage.getItem("walkRoutes")) || [];
      const route = routes[index];
      if (!route || !route.points || route.points.length === 0) return;
      const polyline = new google.maps.Polyline({ path: route.points, map: map, strokeColor: routeColors[index % routeColors.length], strokeOpacity: 0.8, strokeWeight: 4 });
      displayedPolylines[index] = polyline;
      map.setCenter(route.points[0]);
    }
    function hideRoute(index) { if (displayedPolylines[index]) { displayedPolylines[index].setMap(null); displayedPolylines[index] = null; } }
    function deleteRoute(index) {
      const routes = JSON.parse(localStorage.getItem("walkRoutes")) || [];
      routes.splice(index, 1); localStorage.setItem("walkRoutes", JSON.stringify(routes));
      if (displayedPolylines[index]) { displayedPolylines[index].setMap(null); displayedPolylines[index] = null; }
      updateRouteList();
    }
    
    function showCurrentLocation() {
      if (!navigator.geolocation) { alert("現在地を取得できません"); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(latLng);
        if (currentLocationMarker) { currentLocationMarker.setPosition(latLng); } 
        else { currentLocationMarker = new google.maps.Marker({ position: latLng, map: map, icon: defaultIcons[3] }); }
      });
    }

    function updateCategoryFilter() {
      const select = document.getElementById("categoryFilter");
      select.innerHTML = '<option value="すべて">すべてのピンを表示</option>';
      categories.forEach(c => {
        const option = document.createElement("option");
        option.value = c.name; option.textContent = c.name;
        select.appendChild(option);
      });
    }

    function renderMemoList() {
      const selectedCategory = document.getElementById("categoryFilter").value;
      spotMemos.forEach(({ point, marker }) => {
        if (selectedCategory === "すべて" || point.category === selectedCategory) { marker.setMap(map); } 
        else { marker.setMap(null); }
      });
    }

    function loadSpotMemos() {
      const saved = JSON.parse(localStorage.getItem("spotMemos")) || [];
      spotMemos = [];
      saved.forEach(point => {
        if (typeof point.lat !== "number" || typeof point.lng !== "number") return;
        const category = categories.find(c => c.name === point.category);
        const marker = new google.maps.Marker({ position: { lat: point.lat, lng: point.lng }, map: map, icon: category ? category.icon : defaultIcons[0] });
        const infoWindow = new google.maps.InfoWindow();
        updateInfoWindow(point, infoWindow, marker);
        marker.addListener("click", () => showInputForm(point, infoWindow, marker, false));
        spotMemos.push({ point, marker });
      });
      renderMemoList();
    }

    function finalizeSpotMemo(point, marker) {
      const existing = spotMemos.find(p => Math.abs(p.point.lat - point.lat) < 0.000001 && Math.abs(p.point.lng - point.lng) < 0.000001);
      if (existing) { existing.point = point; existing.marker = marker; } 
      else { 
        const infoWindow = new google.maps.InfoWindow();
        marker.addListener("click", () => showInputForm(point, infoWindow, marker, false));
        spotMemos.push({ point, marker }); 
      }
      saveSpotMemos(); alert("保存しました");
    }

    function saveSpotMemos() {
      const data = spotMemos.map(({ point }) => ({ lat: point.lat, lng: point.lng, memo: point.memo, image: point.image, category: point.category }));
      localStorage.setItem("spotMemos", JSON.stringify(data));
      renderMemoList();
    }

    function deleteSpotMemo(lat, lng) {
      spotMemos = spotMemos.filter(({ point, marker }) => {
        const match = Math.abs(point.lat - lat) < 0.000001 && Math.abs(point.lng - lng) < 0.000001;
        if (match && marker) marker.setMap(null);
        return !match;
      });
      saveSpotMemos();
    }

    function updateInfoWindow(point, infoWindow, marker) {
      let content = `<strong>カテゴリ:</strong> ${point.category || "（未設定）"}<br>`;
      content += `<strong>メモ:</strong> ${point.memo || "（なし）"}`;
      if (point.image) content += `<br><img src="${point.image}" width="200">`;
      infoWindow.setContent(content);
    }

    function showInputForm(point, infoWindow, marker, isNew = false) {
      const container = document.createElement("div");
      container.innerHTML = `
        <label>カテゴリ:<br><select id="inputCategory">
          ${categories.map(c => `<option value="${c.name}">${c.name}</option>`).join("")}
        </select></label><br>
        <label>メモ:<br><textarea id="inputMemo" rows="3" style="width:100%;">${point.memo || ""}</textarea></label><br>
        <button id="saveBtn" style="padding:10px; margin-top:5px;">保存</button>
        ${!isNew ? `<button id="deleteBtn" class="danger" style="padding:10px; margin-top:5px;">削除</button>` : ""}`;
      infoWindow.setContent(container);
      infoWindow.open(map, marker);

      google.maps.event.addListenerOnce(infoWindow, "domready", () => {
        document.getElementById("inputCategory").value = point.category || "";
        document.getElementById("saveBtn").onclick = () => {
          point.category = document.getElementById("inputCategory").value;
          point.memo = document.getElementById("inputMemo").value;
          const categoryObj = categories.find(c => c.name === point.category);
          marker.setIcon(categoryObj ? categoryObj.icon : defaultIcons[0]);
          finalizeSpotMemo(point, marker); infoWindow.close(); tempMarker = null;
        };
        if (!isNew) {
          document.getElementById("deleteBtn").onclick = () => {
            deleteSpotMemo(point.lat, point.lng); marker.setMap(null); infoWindow.close();
          };
        }
      });
    }

    function renderWaypointsList() {
      const container = document.getElementById("waypointMemoList");
      container.innerHTML = "";
      spotMemos.forEach(({ point }) => {
        const item = document.createElement("div");
        item.innerHTML = `<label><input type="checkbox" class="waypointCheckbox" data-lat="${point.lat}" data-lng="${point.lng}"> ${point.category} : ${point.memo}</label>`;
        container.appendChild(item);
      });
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDWoGxmGYPAv-HShkfwXCT00vLATt4tiMc&callback=initMap&libraries=geometry,places"></script>
</body>
</html>
