<div style="margin-top: 15px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
  <label style="font-size: 14px; font-weight:bold;">ピンの絞り込み:</label>
  <select id="categoryFilter" onchange="renderMemoList()">
    <option value="すべて">すべてのピンを表示</option>
  </select>
  <div style="display: flex; gap: 5px; margin-top: 8px;">
    <button onclick="addCustomCategory()" class="secondary" style="padding:10px; font-size:14px; flex: 1; margin: 0;">＋ ジャンル追加</button>
    <button onclick="deleteCustomCategory()" class="danger" style="padding:10px; font-size:14px; flex: 1; margin: 0;">－ ジャンル削除</button>
  </div>
</div>
