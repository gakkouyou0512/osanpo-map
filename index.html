<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>お散歩マップ</title>
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0; overscroll-behavior-y: none;
    }
    #map { width: 100%; height: 100vh; }
    #mapControls {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 200px;
      background: #f9f9f9; transition: height 0.2s ease; overflow-y: auto;
      z-index: 999; max-height: 80vh; overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch; padding: 10px; box-sizing: border-box;
    }
    #dragHandle {
      height: 10px; background: #ccc; cursor: ns-resize; margin-bottom: 10px; border-radius: 5px;
    }
    input[type="text"], select {
      width: 70% !important; padding: 8px; margin: 4px 0; font-size: 14px !important;
      border: 1px solid #ccc; border-radius: 4px; display: inline-block; vertical-align: middle;
    }
    button {
      padding: 8px 12px; margin: 4px 2px; font-size: 13px !important; touch-action: manipulation;
      cursor: pointer; border: none; background-color: #e0e0e0; border-radius: 4px; display: inline-block;
    }
    #mapControls h3, #mapControls h4, #modeLabel {
      font-size: 14px !important; font-family: sans-serif; margin: 10px 0 5px 0;
    }
    .switch {
      transform: scale(0.8); transform-origin: top left; display: inline-block; vertical-align: middle;
      width: 60px; height: 34px; position: relative; margin-right: 10px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(26px); }
    .pac-container { z-index: 99999 !important; }
    #routeList { margin-top: 10px; display: none; }
    .memoItem { border: 1px solid #ccc; padding: 5px; margin-bottom: 5px; cursor: pointer; }
    #previewImage { max-width: 200px; display: none; margin-top: 5px; }
    #waypointModal, #searchResults, #waypointMemoList { font-size: 14px !important; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="mapControls">
    <div id="dragHandle"></div>
    <select id="mapTypeSelector" onchange="changeMapType()">
      <option value="roadmap">通常地図</option>
      <option value="satellite">航空写真</option>
      <option value="hybrid">ハイブリッド</option>
      <option value="terrain">地形</option>
    </select>
    
    <div style="margin-bottom: 10px;">
      <label class="switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
      </label>
      <span id="modeLabel">🔍 地図を見る</span>
    </div>

    <button onclick="showRouteList()">ルート一覧</button>
    <button onclick="showCurrentLocation()">現在地</button>
    <button onclick="startTracking()">記録開始</button>
    <button onclick="stopTracking()">停止・保存</button>
    <button id="exitStreetViewBtn" onclick="exitStreetView()" style="display:none;">地図に戻す</button>
    
    <select id="categoryFilter" onchange="renderMemoList()">
      <option value="すべて">すべてのピンを表示</option>
    </select>
    <button id="editCategoryBtn" onclick="showCategoryEditor()">カテゴリ追加</button>

    <hr>

    <input id="placeInput" type="text" placeholder="場所を検索">
    <button onclick="searchPlace()">検索</button><br>

    <input id="originInput" type="text" placeholder="出発地">
    <input id="destinationInput" type="text" placeholder="目的地">
    <button onclick="searchRoute()">ルート検索</button>
    <button id="addWaypointBtn">経由地点を追加</button>
    <button id="saveSearchedRouteBtn" onclick="saveSearchedRoute()" style="display:none; background-color: #4CAF50; color: white;">検索ルートを保存</button>
    
    <div id="waypointsContainer"></div> 

    <h3 id="routeTitle" style="display:none;">ルート一覧</h3>
    <div id="routeList"></div>

    <div id="waypointModal" style="display:none; border-top:2px solid #ccc; margin-top:10px; padding-top:10px;">
      <h3>経由地点を選択 <button id="confirmWaypoint">確定する</button></h3>
      <input type="text" id="searchSpot" placeholder="場所検索">
      <button id="searchBtn">検索</button>
      <div id="searchResults"></div>
      <h4>保存済みメモから選択</h4>
      <div id="waypointMemoList"></div>
    </div>
  </div>

  <script>
    // 高さ調整ドラッグ
    const controls = document.getElementById("mapControls");
    const handle = document.getElementById("dragHandle");
    let isDragging = false;
    handle.addEventListener("mousedown", () => isDragging = true);
    document.addEventListener("mouseup", () => isDragging = false);
    document.addEventListener("mousemove", (e) => {
      if (isDragging) controls.style.height = (window.innerHeight - e.clientY) + "px";
    });
    handle.addEventListener("touchstart", () => isDragging = true);
    document.addEventListener("touchend", () => isDragging = false);
    document.addEventListener("touchmove", (e) => {
      if (isDragging) controls.style.height = (window.innerHeight - e.touches[0].clientY) + "px";
    });

    const routeColors = ["#FF0000", "#0000FF", "#00AA00", "#FF00FF", "#00FFFF", "#FFA500"];
    let displayedPolylines = [];
    let map;
    let route = [];
    let watchId = null;
    let currentLocationMarker = null;
    let spotMemos = [];
    let currentMode = "view";
    let directionsService;
    let directionsRenderer;
    let searchMarker = null;
    let tempMarker = null; // 仮ピン用変数
    let lastSearchedRoutePoints = null;

    const defaultIcons = [
      "http://maps.google.com/mapfiles/ms/icons/red-dot.png", "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
      "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png", "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
      "http://maps.google.com/mapfiles/ms/icons/purple-dot.png"
    ];
    let categories = [
      { name: "危険", icon: defaultIcons[0] }, { name: "おすすめ", icon: defaultIcons[1] }, { name: "注意", icon: defaultIcons[2] }
    ];

    function initMap() {
      // 入力欄タップ時のパネル自動リサイズ
      document.querySelectorAll('input[type="text"]').forEach(input => {
        input.addEventListener('focus', () => controls.style.height = "50vh");
        input.addEventListener('blur', () => controls.style.height = "200px");
      });

      // 1本指移動を許可したマップ初期化
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 35.946, lng: 136.184 },
        zoom: 15,
        mapTypeId: "roadmap",
        gestureHandling: "greedy" 
      });

      // スッキリ予測変換の設定
      function setupCleanAutocomplete(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const auto = new google.maps.places.Autocomplete(input);
        auto.bindTo("bounds", map);
        auto.addListener("place_changed", () => {
          const place = auto.getPlace();
          if (place && place.name) { setTimeout(() => { input.value = place.name; }, 10); }
        });
      }
      setupCleanAutocomplete("originInput");
      setupCleanAutocomplete("destinationInput");
      setupCleanAutocomplete("searchSpot");
      setupCleanAutocomplete("placeInput");

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer();
      directionsRenderer.setMap(map);

      updateCategoryFilter();
      loadSpotMemos();
      updateRouteList();

      // 地図タップ処理（仮ピンを1本にする）
      map.addListener("click", (e) => {
        if (currentMode !== "edit") return;
        if (tempMarker) tempMarker.setMap(null);

        const latLng = e.latLng;
        const point = { lat: latLng.lat(), lng: latLng.lng(), memo: "", image: "", category: "" };
        tempMarker = new google.maps.Marker({ position: { lat: point.lat, lng: point.lng }, map: map });
        const infoWindow = new google.maps.InfoWindow();
        infoWindow.addListener("closeclick", () => { if (tempMarker) { tempMarker.setMap(null); tempMarker = null; } });
        showInputForm(point, infoWindow, tempMarker, true);
      });

      // 経由地点関連のイベント
      document.getElementById("addWaypointBtn").addEventListener("click", () => {
        renderWaypointsList();
        document.getElementById("waypointModal").style.display = "block";
      });

      document.getElementById("searchBtn").addEventListener("click", () => {
        const query = document.getElementById("searchSpot").value;
        if (!query) return;
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: query, bounds: map.getBounds() }, (results, status) => {
          if (status === "OK") {
            const container = document.getElementById("searchResults");
            container.innerHTML = "<strong>検索結果:</strong><br>";
            results.slice(0, 5).forEach(place => {
              container.innerHTML += `<label><input type="checkbox" class="searchWaypoint" data-place-id="${place.place_id}"> ${place.formatted_address}</label><br>`;
            });
          } else { alert("検索に失敗しました: " + status); }
        });
      });

      document.getElementById("confirmWaypoint").addEventListener("click", () => {
        const selectedMemo = document.querySelectorAll(".waypointCheckbox:checked");
        const selectedSearch = document.querySelectorAll(".searchWaypoint:checked");
        const waypoints = [];
        selectedMemo.forEach(cb => waypoints.push({ location: new google.maps.LatLng(parseFloat(cb.dataset.lat), parseFloat(cb.dataset.lng)), stopover: true }));
        selectedSearch.forEach(cb => waypoints.push({ location: { placeId: cb.dataset.placeId }, stopover: true }));
        searchRoute(waypoints);
        document.getElementById("waypointModal").style.display = "none";
      });
    }

    function showCategoryEditor() {
      const newName = prompt("新しいカテゴリ名を入力してください");
      if (newName) {
        categories.push({ name: newName, icon: defaultIcons[categories.length % 5] });
        updateCategoryFilter();
        alert("追加しました");
      }
    }

    function updateCategoryFilter() {
      const select = document.getElementById("categoryFilter");
      select.innerHTML = '<option value="すべて">すべてのピンを表示</option>';
      categories.forEach(c => {
        const option = document.createElement("option");
        option.value = c.name; option.textContent = c.name;
        select.appendChild(option);
      });
    }

    function filterPinsByCategory(categoryName) {
      spotMemos.forEach(({ point, marker }) => {
        if (categoryName === "すべて" || point.category === categoryName) { marker.setMap(map); } 
        else { marker.setMap(null); }
      });
    }

    const modeToggle = document.getElementById("modeToggle");
    const modeLabel = document.getElementById("modeLabel");
    modeToggle.addEventListener("change", () => {
      if (modeToggle.checked) {
        currentMode = "edit"; 
        modeLabel.textContent = "📌 ピンを置く"; // ← スッキリ！
      } else {
        currentMode = "view"; 
        modeLabel.textContent = "🔍 地図を見る"; // ← スッキリ！
        if (tempMarker) { tempMarker.setMap(null); tempMarker = null; }
      }
    });

    function changeMapType() { map.setMapTypeId(document.getElementById("mapTypeSelector").value); }

    function showRouteList() {
      let rTitle = document.getElementById("routeTitle");
      let rList = document.getElementById("routeList");
      if (rTitle.style.display === "none") {
        rTitle.style.display = "block"; rList.style.display = "block";
      } else {
        rTitle.style.display = "none"; rList.style.display = "none";
      }
    }

    function searchPlace() {
      const query = document.getElementById("placeInput").value;
      if (!query) return;
      if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: query }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          searchMarker = new google.maps.Marker({ position: results[0].geometry.location, map: map, title: results[0].formatted_address });
        } else { alert("検索に失敗しました: " + status); }
      });
    }

    function finalizeSpotMemo(point, marker) {
      const existing = spotMemos.find(p => Math.abs(p.point.lat - point.lat) < 0.000001 && Math.abs(p.point.lng - point.lng) < 0.000001);
      if (existing) { 
        existing.point = point; existing.marker = marker; 
      } else { 
        // ▼▼ 新しく立てたピンにも「タップで詳細画面を開く」魔法を追加 ▼▼
        const infoWindow = new google.maps.InfoWindow();
        marker.addListener("click", () => showInputForm(point, infoWindow, marker, false));
        spotMemos.push({ point, marker }); 
      }
      saveSpotMemos();
      alert("保存しました");
    }

    function saveSpotMemos() {
      const data = spotMemos.map(({ point }) => ({ lat: point.lat, lng: point.lng, memo: point.memo, image: point.image, category: point.category }));
      localStorage.setItem("spotMemos", JSON.stringify(data));
      renderMemoList(); // 表示の更新
    }

    function loadSpotMemos() {
      const saved = JSON.parse(localStorage.getItem("spotMemos")) || [];
      spotMemos = [];
      saved.forEach(point => {
        if (typeof point.lat !== "number" || typeof point.lng !== "number") return;
        const category = categories.find(c => c.name === point.category);
        const marker = new google.maps.Marker({ position: { lat: point.lat, lng: point.lng }, map: map, icon: category ? category.icon : defaultIcons[0] });
        const infoWindow = new google.maps.InfoWindow();
        updateInfoWindow(point, infoWindow, marker);
        // ★タップで詳細画面（入力フォーム）を開く設定
        marker.addListener("click", () => showInputForm(point, infoWindow, marker, false));
        spotMemos.push({ point, marker });
      });
      renderMemoList();
    }

    function updateInfoWindow(point, infoWindow, marker) {
      let content = `<strong>カテゴリ:</strong> ${point.category || "（未設定）"}<br>`;
      content += `<strong>メモ:</strong> ${point.memo || "（なし）"}`;
      if (point.image) content += `<br><img src="${point.image}" width="200">`;
      infoWindow.setContent(content);
    }

    function deleteSpotMemo(lat, lng) {
      spotMemos = spotMemos.filter(({ point, marker }) => {
        const match = Math.abs(point.lat - lat) < 0.000001 && Math.abs(point.lng - lng) < 0.000001;
        if (match && marker) marker.setMap(null);
        return !match;
      });
      saveSpotMemos();
    }

    function renderMemoList() {
      // リスト画面は廃止し、カテゴリの絞り込み処理だけを行う
      const selectedCategory = document.getElementById("categoryFilter").value;
      filterPinsByCategory(selectedCategory);
    }

    function showInputForm(point, infoWindow, marker, isNew = false) {
      const container = document.createElement("div");
      container.innerHTML = `
        <label>カテゴリ:<br><select id="inputCategory">
          ${categories.map(c => `<option value="${c.name}">${c.name}</option>`).join("")}
        </select></label><br>
        <label>メモ:<br><textarea id="inputMemo" rows="3" cols="25">${point.memo || ""}</textarea></label><br>
        <label>画像:<br>
          <input type="file" id="inputImage" accept="image/*"><br>
          <img id="previewImage" src="${point.image || ""}" style="max-width:150px; ${point.image ? "display:block;" : "display:none;"}">
        </label><br>
        <button id="saveBtn">保存</button>
        ${!isNew ? `<button id="updateBtn">変更</button>` : ""}
        <button id="deleteBtn">削除</button>`;
      infoWindow.setContent(container);
      infoWindow.open(map, marker);

      google.maps.event.addListenerOnce(infoWindow, "domready", () => {
        document.getElementById("inputCategory").value = point.category || "";

        document.getElementById("saveBtn").onclick = () => {
          point.category = document.getElementById("inputCategory").value;
          point.memo = document.getElementById("inputMemo").value;
          const file = document.getElementById("inputImage").files[0];
          const categoryObj = categories.find(c => c.name === point.category);
          marker.setIcon(categoryObj ? categoryObj.icon : defaultIcons[0]);
          const finalize = () => { finalizeSpotMemo(point, marker); infoWindow.close(); tempMarker = null; };
          if (file) { const reader = new FileReader(); reader.onload = () => { point.image = reader.result; finalize(); }; reader.readAsDataURL(file); } 
          else { finalize(); }
        };

        if (!isNew) {
          document.getElementById("updateBtn").onclick = () => {
            point.category = document.getElementById("inputCategory").value;
            point.memo = document.getElementById("inputMemo").value;
            const file = document.getElementById("inputImage").files[0];
            const categoryObj = categories.find(c => c.name === point.category);
            marker.setIcon(categoryObj ? categoryObj.icon : defaultIcons[0]);
            const update = () => { saveSpotMemos(); updateInfoWindow(point, infoWindow, marker); };
            if (file) { const reader = new FileReader(); reader.onload = () => { point.image = reader.result; update(); }; reader.readAsDataURL(file); } 
            else { update(); }
          };
        }

        document.getElementById("deleteBtn").onclick = () => {
          deleteSpotMemo(point.lat, point.lng); marker.setMap(null); infoWindow.close();
        };

        document.getElementById("inputImage").addEventListener("change", function () {
          const file = this.files[0];
          const preview = document.getElementById("previewImage");
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) { preview.src = e.target.result; preview.style.display = "block"; };
            reader.readAsDataURL(file);
          } else { preview.src = ""; preview.style.display = "none"; }
        });
      });
    }

    function searchRoute(waypoints = []) {
      const origin = document.getElementById("originInput").value;
      const destination = document.getElementById("destinationInput").value;
      if (!origin || !destination) { alert("出発地と目的地を入力してください"); return; }
      
      if (waypoints.length === 0) {
        document.querySelectorAll(".waypointCheckbox:checked").forEach(cb => {
          waypoints.push({ location: new google.maps.LatLng(parseFloat(cb.dataset.lat), parseFloat(cb.dataset.lng)), stopover: true });
        });
        document.querySelectorAll(".searchWaypoint:checked").forEach(cb => {
          waypoints.push({ location: { placeId: cb.dataset.placeId }, stopover: true });
        });
      }
      
      directionsService.route({ origin, destination, waypoints, optimizeWaypoints: true, travelMode: google.maps.TravelMode.DRIVING }, (result, status) => {
        if (status === "OK") { 
          directionsRenderer.setDirections(result); 
          
          try {
            // ルート座標を上の変数（すでに宣言済みのもの）に記憶
            lastSearchedRoutePoints = result.routes[0].overview_path.map(p => ({lat: p.lat(), lng: p.lng()}));
            
            // ボタンを表示
            const saveBtn = document.getElementById("saveSearchedRouteBtn");
            if (saveBtn) {
              saveBtn.style.display = "inline-block";
            } else {
              alert("HTMLにボタンが見つかりません。");
            }
          } catch (error) {
            alert("データ処理エラー: " + error.message);
          }
          
        } else { 
          alert("ルート検索に失敗しました: " + status); 
        }
      });
    }

    // 記憶したルートに名前を付けて保存する仕組み（一覧への即時反映版）
    function saveSearchedRoute() {
      if (!lastSearchedRoutePoints) return;
      const name = prompt("検索したルートの名前を入力してください（例：春の遠足ルート案）");
      if (!name) return; // キャンセルされたら終了
      const description = prompt("ルートの説明を入力してください");
      
      try {
        // 既存の保存システム（LocalStorage）の形式に完全に合わせる
        const newRoute = {
          name: name,
          description: description || "",
          points: lastSearchedRoutePoints,
          timestamp: new Date().toISOString()
        };
        
        // すでに保存されているルートたちを呼び出す
        let routes = JSON.parse(localStorage.getItem("walkRoutes") || "[]");
        routes.push(newRoute);
        
        // 上書き保存する
        localStorage.setItem("walkRoutes", JSON.stringify(routes));
        
        alert("検索ルートを保存しました！「ルート一覧」からいつでも呼び出せます。");
        
        // ▼ ここが重要：画面のルート一覧リストを最新状態に更新する！
        if (typeof renderRoutes === "function") {
          renderRoutes();
        }
        
        // ボタンを隠して、一時記憶をリセット
        document.getElementById("saveSearchedRouteBtn").style.display = "none"; 
        lastSearchedRoutePoints = null;
        
      } catch (error) {
        alert("ルートの保存中にエラーが発生しました: " + error.message);
      }
    }

    function renderWaypointsList() {
      const container = document.getElementById("waypointMemoList");
      container.innerHTML = "";
      spotMemos.forEach(({ point }) => {
        const item = document.createElement("div");
        item.innerHTML = `<label><input type="checkbox" class="waypointCheckbox" data-lat="${point.lat}" data-lng="${point.lng}"> カテゴリ: ${point.category} / メモ: ${point.memo}</label>`;
        container.appendChild(item);
      });
    }

    // ★ GPS等の機能（省略せず保持）
    function startTracking() {
      if (watchId) return;
      route = [];
      watchId = navigator.geolocation.watchPosition(pos => {
        const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        route.push(latLng);
        if (currentLocationMarker) { currentLocationMarker.setPosition(latLng); } 
        else { currentLocationMarker = new google.maps.Marker({ position: latLng, map: map, icon: defaultIcons[3] }); }
        map.setCenter(latLng);
      });
    }
    function stopTracking() {
      if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      if (route.length > 0) {
        const name = prompt("ルート名を入力してください");
        const description = prompt("説明を入力してください");
        if (name && description) { saveRoute(name, description, route); }
      }
    }
    function saveRoute(name, description, points) {
      const routes = JSON.parse(localStorage.getItem("routes")) || [];
      routes.push({ name, description, points });
      localStorage.setItem("routes", JSON.stringify(routes));
      updateRouteList();
    }
    function updateRouteList() {
      const container = document.getElementById("routeList");
      container.innerHTML = "";
      const routes = JSON.parse(localStorage.getItem("routes")) || [];
      routes.forEach((route, index) => {
        const item = document.createElement("div"); item.className = "memoItem";
        let totalDistance = 0;
        for (let i = 1; i < route.points.length; i++) {
          const p1 = new google.maps.LatLng(route.points[i - 1]); const p2 = new google.maps.LatLng(route.points[i]);
          totalDistance += google.maps.geometry.spherical.computeDistanceBetween(p1, p2);
        }
        item.innerHTML = `<strong>ルート:</strong> ${route.name}<br><strong>説明:</strong> ${route.description}<br><strong>距離:</strong> ${(totalDistance / 1000).toFixed(2)} km<br>
        <button onclick="showRoute(${index})">表示</button> <button onclick="hideRoute(${index})">非表示</button> <button onclick="deleteRoute(${index})">削除</button>`;
        container.appendChild(item);
      });
    }
    function showRoute(index) {
      const routes = JSON.parse(localStorage.getItem("routes")) || [];
      const route = routes[index];
      if (!route || !route.points || route.points.length === 0) return;
      const polyline = new google.maps.Polyline({ path: route.points, map: map, strokeColor: routeColors[index % routeColors.length], strokeOpacity: 0.8, strokeWeight: 4 });
      displayedPolylines[index] = polyline;
      map.setCenter(route.points[0]);
    }
    function hideRoute(index) { if (displayedPolylines[index]) { displayedPolylines[index].setMap(null); displayedPolylines[index] = null; } }
    function deleteRoute(index) {
      const routes = JSON.parse(localStorage.getItem("routes")) || [];
      routes.splice(index, 1); localStorage.setItem("routes", JSON.stringify(routes));
      if (displayedPolylines[index]) { displayedPolylines[index].setMap(null); displayedPolylines[index] = null; }
      updateRouteList();
    }
    function showCurrentLocation() {
      if (!navigator.geolocation) { alert("現在地情報を取得できません"); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(latLng);
        if (currentLocationMarker) { currentLocationMarker.setPosition(latLng); } 
        else { currentLocationMarker = new google.maps.Marker({ position: latLng, map: map, icon: defaultIcons[3] }); }
      }, () => alert("現在地の取得に失敗しました"));
    }
    function showStreetView(lat, lng) {
      const panorama = new google.maps.StreetViewPanorama(document.getElementById("map"), { position: { lat, lng }, pov: { heading: 165, pitch: 0 }, zoom: 1 });
      map.setStreetView(panorama); document.getElementById("exitStreetViewBtn").style.display = "inline-block";
    }
    function exitStreetView() { map.getStreetView().setVisible(false); document.getElementById("exitStreetViewBtn").style.display = "none"; }
  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDWoGxmGYPAv-HShkfwXCT00vLATt4tiMc&callback=initMap&libraries=geometry,places"></script>
</body>
